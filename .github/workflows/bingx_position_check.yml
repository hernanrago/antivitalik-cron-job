name: BingX Position Check

on:
  schedule:
    # Corre todos los días a las 12:15 UTC
    - cron: "15 12 * * *"
  # Permite ejecutarlo manualmente desde la UI de GitHub
  workflow_dispatch:

jobs:
  check-position:
    name: Check Perpetual Futures Position
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run position checker
        env:
          BINGX_API_KEY: ${{ secrets.BINGX_API_KEY }}
          BINGX_API_SECRET: ${{ secrets.BINGX_API_SECRET }}
        run: python check_position.py
