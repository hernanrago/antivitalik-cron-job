name: BingX DCA

on:
  schedule:
    # Corre diariamente a las 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      capital:
        description: "Capital total en USDT (sobreescribe vars.CAPITAL)"
        required: false
        default: ""
      dry_run:
        description: "Modo DRY RUN (no ejecuta órdenes reales)"
        type: boolean
        required: false
        default: false

jobs:
  dca:
    name: BingX DCA — ADA-USDT + ETH-USDT
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run DCA bot
        env:
          BINGX_API_KEY: ${{ secrets.BINGX_API_KEY }}
          BINGX_API_SECRET: ${{ secrets.BINGX_API_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CAPITAL: ${{ inputs.capital || vars.CAPITAL }}
          DRY_RUN: ${{ inputs.dry_run || vars.DRY_RUN || 'false' }}
        run: python check_position.py
