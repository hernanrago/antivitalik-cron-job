name: BingX Position Check

on:
  schedule:
    # Corre todos los días cada una hora a los 15 minutos (00:15, 01:15, 02:15 ... 23:15 UTC)
    - cron: "15 * * * *"
  workflow_dispatch:
    inputs:
      symbol:
        description: "Símbolo a consultar (ej: ETH-USDT). Vacío = todos."
        required: false
        default: ""

jobs:
  check-position:
    name: Check Perpetual Futures Position
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run position checker
        env:
          BINGX_API_KEY: ${{ secrets.BINGX_API_KEY }}
          BINGX_API_SECRET: ${{ secrets.BINGX_API_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BINGX_SYMBOL: ${{ inputs.symbol }}
        run: python check_position.py
